name: Bug Report
description: Report a bug in philiprehberger_result_type
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: dart-version
    attributes:
      label: Dart Version
      placeholder: e.g. 3.6.0
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package Version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15, Ubuntu 24.04, Windows 11
    validations:
      required: true
